name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_live_smoke:
        description: "Run live smoke tests against real services"
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: ruff check app tests
      - run: ruff format --check app tests
      - run: mypy app
      - run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci || npm install
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  live-smoke:
    name: Live smoke (real services)
    runs-on: ubuntu-latest
    # Only on manual trigger with the input checked, OR when secrets exist
    # on the default branch (so we don't accidentally burn credits on PRs).
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.run_live_smoke) ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    defaults:
      run:
        working-directory: backend
    env:
      RUN_LIVE_SMOKE: "1"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET }}
      LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SUPABASE_STORAGE_BUCKET: ${{ vars.SUPABASE_STORAGE_BUCKET || 'uploads' }}
      SUPABASE_STORAGE_PRIVATE: ${{ vars.SUPABASE_STORAGE_PRIVATE || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Live smoke tests
        run: pytest -q tests/test_live_smoke.py
        env:
          # Pre-flight: every required secret must be set, otherwise the
          # inner pytest.skip() in test_live_smoke.py will skip the tests
          # (we still want the job to PASS in that case so we know
          # secrets are simply not configured).
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'unset' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'unset' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'unset' }}
          LINE_CHANNEL_SECRET: ${{ secrets.LINE_CHANNEL_SECRET || 'unset' }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN || 'unset' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'unset' }}
